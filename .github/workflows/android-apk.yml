name: Build Android Standalone APK
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android Standalone Preview APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest Test Suite
        run: npm run test:ci

      - name: Run TypeScript Typecheck
        run: npm run typecheck

      - name: Run Expo Diagnostics
        run: npm run doctor

      - name: Generate Android Project (Expo CNG Prebuild)
        run: |
          CI=1 EXPO_NO_GIT_STATUS=1 npx expo prebuild \
            --platform android \
            --clean \
            --no-install

      - name: Build Android Release Binary with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK Output and JS Bundle
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          
          # 1. Verify file exists
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Release APK not found at $APK_PATH"
            exit 1
          fi
          
          # 2. Verify no ambiguity
          APK_COUNT=$(find android/app/build/outputs/apk/release/ -name "*.apk" | wc -l)
          if [ "$APK_COUNT" -ne 1 ]; then
            echo "ERROR: Ambiguous APK structure. Found $APK_COUNT APKs instead of 1."
            exit 1
          fi
          
          # 3. Verify JavaScript bundle inside the APK
          echo "Verifying JavaScript bundle asset presence in APK..."
          if ! unzip -l "$APK_PATH" | grep -q "assets/index.android.bundle"; then
            echo "ERROR: The standalone release APK is missing index.android.bundle!"
            exit 1
          fi
          echo "Verification successful: index.android.bundle is present."

      - name: Prepare Standalone Preview APK Artifact
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk ./dokploy-companion-standalone-preview.apk
          sha256sum ./dokploy-companion-standalone-preview.apk > ./dokploy-companion-standalone-preview.apk.sha256

      - name: Upload Android Standalone Preview APK
        uses: actions/upload-artifact@v4
        with:
          name: Dokploy Companion Standalone Preview APK
          path: |
            dokploy-companion-standalone-preview.apk
            dokploy-companion-standalone-preview.apk.sha256
          retention-days: 14
