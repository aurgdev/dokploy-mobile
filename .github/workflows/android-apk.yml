name: Build Android APK
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android Debug Preview APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest Test Suite
        run: npm run test:ci

      - name: Run TypeScript Typecheck
        run: npm run typecheck

      - name: Run Expo Diagnostics
        run: npm run doctor

      - name: Generate Android Project (Expo CNG Prebuild)
        run: |
          CI=1 EXPO_NO_GIT_STATUS=1 npx expo prebuild \
            --platform android \
            --clean \
            --no-install

      - name: Build Android Debug Binary with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare Android Preview APK Artifact
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk ./dokploy-companion-preview.apk
          sha256sum ./dokploy-companion-preview.apk > ./dokploy-companion-preview.apk.sha256

      - name: Upload Android Preview APK
        uses: actions/upload-artifact@v7
        with:
          name: Android Preview APK
          path: |
            dokploy-companion-preview.apk
            dokploy-companion-preview.apk.sha256
          retention-days: 14
